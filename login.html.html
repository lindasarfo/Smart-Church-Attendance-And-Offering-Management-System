<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Church Management System</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ============================================================ -->
    <!-- LOGIN PAGE (standalone)                                       -->
    <!-- ============================================================ -->
    <div class="login-page" id="loginPage">
        <div class="login-box">
            <div class="login-logo">
                <!-- REPLACE WITH YOUR CHURCH LOGO -->
                <img src="logo.png" alt="logo.png" />
            </div>
            <h1>Church Management</h1>
            <p>Sign in to access the system</p>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="loginUsername" value="admin" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" value="admin123" />
            </div>

            <button class="btn-login" id="loginBtn">Login</button>
            <div id="loginError" class="error-msg"></div>

            <div style="margin-top: 16px; font-size: 12px; color: #5a6a8a; border-top: 1px solid #d0d8e8; padding-top: 12px;">
                <strong>Default Credentials:</strong><br />
                Super Admin: <code>admin</code> / <code>admin123</code><br />
                Admin: <code>user</code> / <code>user123</code>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  REDIRECT IF ALREADY LOGGED IN
        // ============================================================
        if (localStorage.getItem('church_session')) {
            window.location.href = 'dashboard.html';
        }

        // ============================================================
        //  LOGIN LOGIC
        // ============================================================
        document.getElementById('loginBtn').addEventListener('click', function() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const error = document.getElementById('loginError');

            if (!username || !password) {
                error.textContent = 'Please enter username and password.';
                return;
            }

            // Get users from localStorage
            let users = [];
            try {
                const raw = localStorage.getItem('church_users');
                users = raw ? JSON.parse(raw) : [];
            } catch { users = []; }

            // If no users exist, seed default users
            if (users.length === 0) {
                users = [
                    { username: 'admin', password: 'admin123', role: 'superadmin' },
                    { username: 'user', password: 'user123', role: 'admin' }
                ];
                localStorage.setItem('church_users', JSON.stringify(users));
            }

            // Find user
            const found = users.find(u => u.username === username && u.password === password);

            if (found) {
                error.textContent = '';
                // Store session
                localStorage.setItem('church_session', JSON.stringify({
                    username: found.username,
                    role: found.role,
                    loginTime: new Date().toISOString()
                }));
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                error.textContent = 'Invalid username or password.';
            }
        });

        // Enter key support
        document.getElementById('loginPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
        document.getElementById('loginUsername').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
    </script>

</body>
</html>
