<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Church Management System</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        /* Quick fallback styles in case style.css doesn't load */
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #1a3a6a 0%, #2a5a9a 100%);
        }
        .login-box {
            background: #ffffff;
            padding: 40px 36px;
            border-radius: 24px;
            width: 380px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            text-align: center;
        }
        .login-logo img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #1a3a6a;
            padding: 4px;
        }
        .login-box h1 {
            font-size: 26px;
            color: #0a1a3a;
            margin-bottom: 4px;
        }
        .login-box p {
            color: #5a6a8a;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .login-box .form-group {
            margin-bottom: 18px;
            text-align: left;
        }
        .login-box label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            color: #1a3a6a;
            margin-bottom: 4px;
        }
        .login-box input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #d0d8e8;
            border-radius: 10px;
            font-size: 15px;
            background: #f0f4fa;
            outline: none;
        }
        .login-box input:focus {
            border-color: #2a5a9a;
            box-shadow: 0 0 0 4px rgba(42, 90, 154, 0.15);
        }
        .login-box .btn-login {
            width: 100%;
            padding: 14px;
            background: #1a3a6a;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
        }
        .login-box .btn-login:hover {
            background: #2a5a9a;
            transform: translateY(-2px);
        }
        .login-box .error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            min-height: 20px;
        }
        .login-box code {
            background: #f0f4fa;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            color: #1a3a6a;
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- LOGIN PAGE -->
    <!-- ============================================================ -->
    <div class="login-page" id="loginPage">
        <div class="login-box">
            <div class="login-logo">
                <!-- REPLACE WITH YOUR CHURCH LOGO -->
                <img src="logo.png" alt="logo.png" />
            </div>
            <h1>Church Management</h1>
            <p>Sign in to access the system</p>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="loginUsername" value="admin" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" value="admin123" />
            </div>

            <button class="btn-login" id="loginBtn">Login</button>
            <div id="loginError" class="error-msg"></div>

            <div style="margin-top: 16px; font-size: 12px; color: #5a6a8a; border-top: 1px solid #d0d8e8; padding-top: 12px;">
                <strong>Default Credentials:</strong><br />
                Super Admin: <code>admin</code> / <code>admin123</code><br />
                Admin: <code>user</code> / <code>user123</code>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  REDIRECT IF ALREADY LOGGED IN
        // ============================================================
        try {
            const session = localStorage.getItem('church_session');
            if (session) {
                const data = JSON.parse(session);
                if (data && data.username) {
                    window.location.href = 'dashboard.html';
                }
            }
        } catch (e) {
            // If session is corrupt, ignore and show login
            localStorage.removeItem('church_session');
        }

        // ============================================================
        //  LOGIN LOGIC
        // ============================================================
        document.getElementById('loginBtn').addEventListener('click', function() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const error = document.getElementById('loginError');

            if (!username || !password) {
                error.textContent = 'Please enter username and password.';
                return;
            }

            // Get users from localStorage
            let users = [];
            try {
                const raw = localStorage.getItem('church_users');
                users = raw ? JSON.parse(raw) : [];
            } catch (e) {
                users = [];
            }

            // If no users exist, seed default users
            if (users.length === 0) {
                users = [
                    { username: 'admin', password: 'admin123', role: 'superadmin' },
                    { username: 'user', password: 'user123', role: 'admin' }
                ];
                localStorage.setItem('church_users', JSON.stringify(users));
            }

            // Find user
            const found = users.find(u => u.username === username && u.password === password);

            if (found) {
                error.textContent = '';
                // Store session
                localStorage.setItem('church_session', JSON.stringify({
                    username: found.username,
                    role: found.role,
                    loginTime: new Date().toISOString()
                }));
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                error.textContent = 'Invalid username or password.';
            }
        });

        // Enter key support
        document.getElementById('loginPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('loginBtn').click();
            }
        });
        document.getElementById('loginUsername').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('loginBtn').click();
            }
        });

        // ============================================================
        //  DEBUG: Log to console if page loaded
        // ============================================================
        console.log('✅ Login page loaded successfully!');
        console.log('📌 Users in localStorage:', localStorage.getItem('church_users'));
        console.log('📌 Session in localStorage:', localStorage.getItem('church_session'));
    </script>

</body>
</html>
